version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always

  backend:
    build:
      context: ./backend
    ports:
      - "5000:5000"
    environment:
      - MYSQL_DSN=root:Kazah1/2Aktau@tcp(db:3306)/damukids?charset=utf8mb4&parseTime=True&loc=Local
      - JWT_SECRET=your_super_secret_key_prod
      - PORT=5000
    depends_on:
      - db
    volumes:
      - backend_uploads:/app/uploads
    restart: always

  db:
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: Kazah1/2Aktau
      MYSQL_DATABASE: damukids
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    restart: always

volumes:
  mysql_data:
  backend_uploads:
